<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NovaCognix</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css"/>
</head>
<body>

  <!-- ── Auth Screen ─────────────────────────────────────────────────── -->
  <div class="auth-screen" id="authScreen">
    <div class="auth-card">
      <div class="auth-logo">✦ NovaCognix</div>
      <div class="auth-tabs">
        <button class="auth-tab active" id="tabLogin"  onclick="switchTab('login')">Sign In</button>
        <button class="auth-tab"        id="tabReg"    onclick="switchTab('register')">Sign Up</button>
      </div>

      <!-- Login -->
      <form class="auth-form" id="loginForm" onsubmit="handleLogin(event)">
        <input type="text"     id="loginUser" placeholder="Username" required autocomplete="username"/>
        <input type="password" id="loginPass" placeholder="Password" required autocomplete="current-password"/>
        <button type="submit" class="auth-btn">Sign In</button>
        <p class="auth-error" id="loginError"></p>
      </form>

      <!-- Register -->
      <form class="auth-form hidden" id="registerForm" onsubmit="handleRegister(event)">
        <input type="text"     id="regUser"  placeholder="Username" required autocomplete="username"/>
        <input type="email"    id="regEmail" placeholder="Email"    required autocomplete="email"/>
        <input type="password" id="regPass"  placeholder="Password (min 6 chars)" required autocomplete="new-password"/>
        <button type="submit" class="auth-btn">Create Account</button>
        <p class="auth-error" id="registerError"></p>
      </form>
    </div>
  </div>

  <!-- ── Chat App ────────────────────────────────────────────────────── -->
  <div class="app hidden" id="chatApp">
    <aside class="sidebar">
      <div class="sidebar-logo">
        <div class="logo-icon">✦</div>
        <span>NovaCognix</span>
      </div>
      <button class="new-chat-btn" id="clearBtn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
        New Chat
      </button>
      <button class="voice-btn" id="voiceNavBtn" onclick="window.location.href='/voice-assistant'">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
          <line x1="12" y1="19" x2="12" y2="23"/>
          <line x1="8" y1="23" x2="16" y2="23"/>
        </svg>
        Voice Assistant
      </button>
      <div class="sidebar-section-label">Recent</div>
      <div class="sidebar-history" id="sidebarHistory"></div>
      <div class="sidebar-footer">
        <div class="user-info">
          <span class="user-avatar" id="userAvatar">U</span>
          <span id="usernameLabel"></span>
        </div>
        <button class="logout-btn" onclick="logout()">Sign out</button>
        <div class="model-badge"><span class="model-dot"></span>LLaMA 3.3 · 70B</div>
      </div>
    </aside>

    <main class="chat-main">
      <div class="empty-state" id="emptyState">
        <div class="empty-icon">✦</div>
        <h1>How can I help you?</h1>
        <p>Ask me anything — I give accurate, well-reasoned answers.</p>
        <div class="suggestion-grid">
          <button class="suggestion" data-text="Explain quantum computing in simple terms">Explain quantum computing in simple terms</button>
          <button class="suggestion" data-text="Write a Python function to sort a list">Write a Python function to sort a list</button>
          <button class="suggestion" data-text="What are the best practices for REST APIs?">Best practices for REST APIs</button>
          <button class="suggestion" data-text="How does machine learning work?">How does machine learning work?</button>
        </div>
      </div>

      <div class="messages" id="messages"></div>

      <div class="input-dock">
        <div class="input-box">
          <textarea id="userInput" placeholder="Message NovaCognix..." rows="1"></textarea>
          <button id="sendBtn" disabled>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
              <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
            </svg>
          </button>
        </div>
        <p class="disclaimer">AI can make mistakes. Verify important information.</p>
      </div>
    </main>
  </div>

  <!-- ── Voice Assistant Overlay ──────────────────────────────────────── -->
  <div class="voice-overlay hidden" id="voiceOverlay">
    <button class="voice-close" id="voiceClose">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>

    <div class="voice-content">
      <div class="voice-orb-wrap">
        <div class="voice-orb" id="voiceOrb">
          <div class="orb-ring r1"></div>
          <div class="orb-ring r2"></div>
          <div class="orb-ring r3"></div>
          <div class="orb-core">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
              <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
              <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
            </svg>
          </div>
        </div>
      </div>

      <div class="voice-status" id="voiceStatus">Tap the mic to start</div>
      <div class="voice-transcript" id="voiceTranscript"></div>
      <div class="voice-reply" id="voiceReply"></div>

      <div class="voice-lang-bar">
        <span class="lang-label">Language:</span>
        <span class="lang-current" id="langCurrent">Auto-detect</span>
      </div>

      <div class="voice-controls">
        <button class="voice-mic-btn" id="voiceMicBtn">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
            <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
            <line x1="12" y1="19" x2="12" y2="23"/>
            <line x1="8" y1="23" x2="16" y2="23"/>
          </svg>
        </button>
        <p class="voice-hint">Hold to speak · Release to send</p>
      </div>
    </div>
  </div>

  <script src="/static/app.js"></script>
  <script src="/static/voice.js"></script>
</body>
</html>
