<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Voice Assistant — NovaCognix</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/voice.css?v=4"/>
</head>
<body>
  <div class="va-app">

    <!-- Sidebar -->
    <aside class="va-sidebar">
      <div class="sidebar-logo">
        <div class="logo-icon">✦</div>
        <span>NovaCognix</span>
      </div>
      <a href="/" class="va-nav-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
        New Chat
      </a>
      <div class="va-nav-btn active">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
          <line x1="12" y1="19" x2="12" y2="23"/>
          <line x1="8" y1="23" x2="16" y2="23"/>
        </svg>
        Voice Assistant
      </div>

      <div class="sidebar-section-label">Voice History</div>
      <div class="va-history" id="vaHistory"></div>

      <div class="va-sidebar-footer">
        <div class="user-info">
          <span class="user-avatar" id="userAvatar">U</span>
          <span id="usernameLabel"></span>
        </div>
        <button class="logout-btn" onclick="logout()">Sign out</button>
        <div class="model-badge"><span class="model-dot"></span>LLaMA 3.3 · 70B</div>
      </div>
    </aside>

    <!-- Main voice area -->
    <main class="va-main">

      <!-- Top bar -->
      <div class="va-topbar">
        <div class="va-timer" id="vaTimer">00:00</div>
        <div class="va-lang-pill" id="vaLangPill">🌐 Auto-detect</div>
        <button class="va-settings-btn" id="vaSettingsBtn" title="Language & Voice settings">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
        </button>
      </div>

      <!-- Settings Panel -->
      <div class="va-settings-panel hidden" id="vaSettingsPanel">
        <div class="settings-header">
          <span>Settings</span>
          <button class="settings-close" id="vaSettingsClose">✕</button>
        </div>

        <div class="settings-group">
          <label class="settings-label">Language</label>
          <div class="lang-grid" id="langGrid">
            <button class="lang-chip active" data-lang="en-US">🇺🇸 English</button>
            <button class="lang-chip" data-lang="es-ES">🇪🇸 Spanish</button>
            <button class="lang-chip" data-lang="fr-FR">🇫🇷 French</button>
            <button class="lang-chip" data-lang="de-DE">🇩🇪 German</button>
            <button class="lang-chip" data-lang="hi-IN">🇮🇳 Hindi</button>
            <button class="lang-chip" data-lang="te-IN">🇮🇳 Telugu</button>
            <button class="lang-chip" data-lang="ta-IN">🇮🇳 Tamil</button>
            <button class="lang-chip" data-lang="ja-JP">🇯🇵 Japanese</button>
            <button class="lang-chip" data-lang="zh-CN">🇨🇳 Chinese</button>
            <button class="lang-chip" data-lang="ar-SA">🇸🇦 Arabic</button>
            <button class="lang-chip" data-lang="pt-BR">🇧🇷 Portuguese</button>
            <button class="lang-chip" data-lang="it-IT">🇮🇹 Italian</button>
          </div>
        </div>

        <div class="settings-group">
          <label class="settings-label">Voice</label>
          <select class="voice-select" id="voiceSelect">
            <option value="">Default voice</option>
          </select>
        </div>

        <div class="settings-group">
          <label class="settings-label">Speed — <span id="rateVal">1.0</span>x</label>
          <input type="range" class="voice-range" id="rateRange" min="0.5" max="2" step="0.1" value="1.0"/>
        </div>

        <div class="settings-group">
          <label class="settings-label">Pitch — <span id="pitchVal">1.0</span></label>
          <input type="range" class="voice-range" id="pitchRange" min="0.5" max="2" step="0.1" value="1.0"/>
        </div>

        <button class="settings-test-btn" id="testVoiceBtn">▶ Test Voice</button>
      </div>

      <!-- Orb area -->
      <div class="va-center">
        <div class="va-orb-container">
          <div class="va-orb" id="vaOrb">
            <div class="orb-gloss"></div>
            <div class="orb-shine"></div>
          </div>
          <div class="va-wave-ring" id="waveRing">
            <span></span><span></span><span></span><span></span>
          </div>
        </div>

        <div class="va-label" id="vaLabel">Nova</div>
        <div class="va-sublabel" id="vaSublabel">Tap to start speaking</div>

        <!-- Live transcript bubble -->
        <div class="va-bubble" id="vaBubble"></div>
      </div>

      <!-- Conversation transcript -->
      <div class="va-transcript-panel" id="vaTranscriptPanel">
        <div class="va-transcript-title">Conversation</div>
        <div class="va-transcript-list" id="vaTranscriptList"></div>
      </div>

      <!-- Controls -->
      <div class="va-controls">
        <button class="va-mic-btn" id="vaMicBtn">
          <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
            <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
            <line x1="12" y1="19" x2="12" y2="23"/>
            <line x1="8" y1="23" x2="16" y2="23"/>
          </svg>
        </button>
        <button class="va-end-btn" id="vaEndBtn">End</button>
      </div>

    </main>
  </div>

  <script src="/static/voice-page.js?v=2"></script>
</body>
</html>
